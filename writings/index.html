<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writings — Matthew Bramer</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<main>
<header>
  <h1 class="site-title">Matthew Bramer</h1>
  <p class="site-subtitle">Writings archive.</p>
  <nav>
    <a href="/">Home</a>
    <a href="/projects">Projects</a>
    <a href="/writings">Writings</a>
    <a href="/teachings">Teachings</a>
  </nav>
</header>
<section class="archive-section">
  <div class="archive-title">Writings</div>
  <p class="archive-meta" id="archive-count">Loading archive…</p>
  <ul class="archive-list" id="archive-list"></ul>
</section>
</main>
<script>
fetch('/content/thoughts/index.json').then(r=>r.json()).then(entries=>{
  const list=document.getElementById('archive-list');
  document.getElementById('archive-count').textContent=`${entries.length} entries`;
  list.innerHTML=entries.map(file=>`<li class="archive-item"><a class="archive-link" href="/content/thoughts/${encodeURI(file)}">${file.replace('.html','')}</a></li>`).join('');
}).catch(()=>{document.getElementById('archive-count').textContent='Unable to load archive.'});
</script>
</body>
</html>
