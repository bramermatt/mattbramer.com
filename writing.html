<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Archive | Matt Bramer</title>
    <meta name="description" content="A complete chronological archive of Matt Bramer's essays, reviews, and reflections.">
    <link rel="shortcut icon" href="mLogo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="archive-page">
    <main class="archive-shell">
        <p><a href="index.html">← Home</a></p>
        <h1>Writing Archive</h1>
        <p>Every published piece in one chronological list.</p>
        <p class="meta" id="archive-count">Loading archive…</p>

        <ol id="archive-list"></ol>
    </main>

    <script>
        const archiveList = document.getElementById('archive-list');
        const archiveCount = document.getElementById('archive-count');

        const categoryLabel = (slug) => {
            if (slug.includes('bookreview')) return 'Book Review';
            if (slug.includes('moviereview')) return 'Movie Review';
            if (slug.includes('tvshowreview')) return 'TV Review';
            if (slug.includes('websiteupdate') || slug.includes('websiteupdates')) return 'Website Update';
            if (slug.includes('bikecommute')) return 'Bike Commute';
            if (slug.includes('faith')) return 'Faith';
            if (slug.includes('familyblog')) return 'Family';
            if (slug.includes('opinionblog')) return 'Opinion';
            if (slug.includes('books-')) return 'Books';
            return 'Writing';
        };

        const titleFromSlug = (slug) => {
            return slug
                .replace(/\.html$/i, '')
                .replace(/^\d{4}-\d{1,2}-\d{1,2}-/, '')
                .replace(/-/g, ' ')
                .replace(/\b\w/g, (m) => m.toUpperCase());
        };

        const humanDate = (iso) => {
            const [y, m, d] = iso.split('-').map(Number);
            const dt = new Date(Date.UTC(y, m - 1, d));
            return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
        };

        fetch('content/thoughts/index.json')
            .then((response) => response.json())
            .then((entries) => {
                archiveCount.textContent = `${entries.length} articles`;
                archiveList.innerHTML = entries.map((file) => {
                    const match = file.match(/^(\d{4}-\d{1,2}-\d{1,2})-(.*)$/);
                    const datePart = match ? match[1] : '2000-01-01';
                    const slugPart = match ? match[2] : file;
                    const label = categoryLabel(slugPart.toLowerCase());
                    return `<li><time datetime="${datePart}">${humanDate(datePart)}</time> — <a href="content/thoughts/${encodeURI(file)}">${titleFromSlug(slugPart)}</a> <span class="archive-type">· ${label}</span></li>`;
                }).join('');
            })
            .catch(() => {
                archiveCount.textContent = 'Unable to load archive list.';
            });
    </script>
</body>
</html>
